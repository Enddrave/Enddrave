<section class="container grid-3">
  
  <!-- 📈 Telemetry with connection status -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3>Telemetry</h3>
      <span id="connectionStatus" style="font-size:14px;color:#555;">Connecting...</span>
    </div>

    <div style="height:280px; max-height:60vh;">
      <canvas id="telemetryChart"></canvas>
    </div>
  </div>

  <!-- 📊 Device Status -->
  <div class="panel">
    <h3>Device Status</h3>
    <ul class="status">
      <li><strong>Device:</strong> <span id="deviceId">ENV-NODE-01</span></li>
      <li><strong>Location:</strong> <span id="location">Factory Lab</span></li>
      <li><strong>Firmware:</strong> <span id="firmware">v1.0.3</span></li>
      <li><strong>State:</strong> <span id="stateDot" class="dot green"></span> Online</li>
      <li><strong>Last seen:</strong> <span id="lastSeen">—</span></li>
      <li><strong>Temperature:</strong> <span id="temperature">—</span></li>
      <li><strong>Humidity:</strong> <span id="humidity">—</span></li>
    </ul>
    <h4>AI Insight</h4>
    <p>Anomaly score: <strong id="anomalyScore">0%</strong></p>
  </div>

  <!-- 💡 Command Center -->
  <div class="panel">
    <h3>Command Center</h3>
    <button class="btn primary" id="ledOn">LED ON</button>
    <button class="btn" id="ledOff">LED OFF</button>
    <button class="btn ghost" id="simulateOta">Simulate OTA</button>
    <div id="cmdLog" class="log"></div>
  </div>
</section>
